spring.application.name=ChatApp

spring.config.import=optional:file:./.env[.properties]

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/chatapp}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# FLYWAY (remplace l'ancien spring.sql.init.mode)
# baseline-on-migrate : si la DB existe déjà sans table flyway_schema_history,
# Flyway la marque comme baselinée à baseline-version, puis applique les migrations suivantes.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# MAIL (MailHog)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.from=${MAIL_FROM:noreply@chatapp.com}

# MULTIPART (uploads limited to 20 MB, matches sendMessage's own validation)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
